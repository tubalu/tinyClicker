name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (macos-14)
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Build .app
        run: make build

      - name: Verify bundle layout
        run: |
          test -x build/tinyClicker.app/Contents/MacOS/tinyClicker
          test -f build/tinyClicker.app/Contents/Info.plist
          file build/tinyClicker.app/Contents/MacOS/tinyClicker

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinyClicker-app-${{ github.sha }}
          path: build/tinyClicker.app
          if-no-files-found: error
          retention-days: 7
